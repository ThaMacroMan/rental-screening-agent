# fly.toml app configuration file generated for voiceagentautomation on 2026-04-12T17:17:38-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'voiceagentautomation'
primary_region = 'yyz'
kill_signal = 'SIGINT'
kill_timeout = '30s'

[build]
  dockerfile = 'Dockerfile'

[env]
  MCP_PORT = '8000'
  NODE_ENV = 'production'
  PORT = '8080'
  PROXY_PORT = '8080'
  RUNTIME_DIR = '/data'
  TWILIO_TTS_LANGUAGE = 'en-US'
  TWILIO_TTS_VOICE = 'Google.en-US-Chirp3-HD-Aoede'
  TWILIO_TTS_VOICE_FALLBACK = 'Polly.Joanna-Neural'
  VALIDATE_TWILIO_WEBHOOKS = 'true'
  VOICE_PORT = '8002'
  VOICE_RUNTIME_PATH = '/data/runtime.json'
  VOICE_STATE_PATH = '/data/tenant-screening-state.json'

[[mounts]]
  source = 'app_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
